<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOSS直聘助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 — Glassmorphism gradient -->
    <header class="popup-header">
      <h1 class="popup-title">✦ BOSS直聘助手</h1>
      <span class="popup-version">v1.0</span>
    </header>

    <!-- 今日统计卡片 — Neumorphism -->
    <section class="stats-section">
      <h2 class="section-title">📊 今日数据</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-applications">--</div>
          <div class="stat-label">投递</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-messages">--</div>
          <div class="stat-label">消息</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-response">--%</div>
          <div class="stat-label">回复率</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-interviews">--</div>
          <div class="stat-label">面试</div>
        </div>
      </div>
    </section>

    <!-- 本周统计 — Glass row -->
    <section class="stats-section">
      <h2 class="section-title">📅 本周累计</h2>
      <div class="weekly-row">
        <span>本周投递 <strong id="stat-weekly-apps">--</strong> 次</span>
        <span>总计 <strong id="stat-total-apps">--</strong> 次</span>
      </div>
    </section>

    <!-- 功能开关 — Creative toggles -->
    <section class="toggles-section">
      <h2 class="section-title">⚡ 功能设置</h2>
      <div class="toggle-row">
        <span>💬 快捷回复</span>
        <label class="switch">
          <input type="checkbox" id="toggle-quick-reply" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>🏷️ 已投递标记</span>
        <label class="switch">
          <input type="checkbox" id="toggle-badges" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>🤖 AI 分类</span>
        <label class="switch">
          <input type="checkbox" id="toggle-ai" checked>
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <!-- 底部按钮 — Gradient + Neumorphism -->
    <footer class="popup-footer">
      <button id="btn-dashboard" class="btn btn-primary">📊 完整面板</button>
      <button id="btn-settings" class="btn btn-secondary">⚙️ 设置</button>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
